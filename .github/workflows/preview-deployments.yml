# CI to release the project for Linux, Windows, and MacOS
# The purpose of this action is to verify if the release builds are working or not.

name: Preview Release

on:
  push:
    branches:
      - main
      - ci/test-macos
  pull_request:
    branches:
      - main

env:
  SCCACHE_GHA_RW_MODE: ${{ github.event_name == 'pull_request' && 'READ_ONLY' || 'READ_WRITE' }}

permissions:
  contents: read

jobs:
  macos:
    runs-on: macos-15
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13", "3.14"]
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v8.3.2
        with:
          cache-python: "true"
          activate-environment: "true"
          python-version: ${{ matrix.python-version }}
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-apple-darwin aarch64-apple-darwin
      - name: Configure sccache
        uses: actions/github-script@v7
        with:
          script: |
            core.exportVariable("ACTIONS_RESULTS_URL", process.env.ACTIONS_RESULTS_URL || "");
            core.exportVariable("ACTIONS_RUNTIME_TOKEN", process.env.ACTIONS_RUNTIME_TOKEN || "");
      - name: Build wheels - x86_64
        uses: PyO3/maturin-action@v1
        env:
          SCCACHE_GHA_CACHE_TO: ${{ matrix.python-version == '3.12' && 'sccache-macos-x86_64-3.12' || '' }}
          SCCACHE_GHA_CACHE_FROM: sccache-macos-x86_64-
        with:
          sccache: "true"
          target: x86_64
          args: -i python --release --out dist
      - name: Build wheels - aarch64
        uses: PyO3/maturin-action@v1
        env:
          SCCACHE_GHA_CACHE_TO: ${{ matrix.python-version == '3.12' && 'sccache-macos-aarch64-3.12' || '' }}
          SCCACHE_GHA_CACHE_FROM: sccache-macos-aarch64-
        with:
          sccache: "true"
          target: aarch64
          args: -i python --release --out dist
      - name: Test wheel
        shell: bash
        run: |
          uv pip install --force-reinstall dist/robyn*arm64.whl
          cd ~ && python -c "import robyn"

  windows:
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13", "3.14"]
        target: [x64, arm64]
        exclude:
          - target: arm64
            python-version: "3.10"
        include:
          - target: x64
            runner: windows-2025
            architecture: x64
          - target: arm64
            runner: windows-11-arm
            architecture: arm64
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v8.3.2
        with:
          cache-python: "true"
          activate-environment: "true"
          python-version: ${{ matrix.python-version }}
      - uses: dtolnay/rust-toolchain@stable
      - name: Configure sccache
        uses: actions/github-script@v7
        with:
          script: |
            core.exportVariable("ACTIONS_RESULTS_URL", process.env.ACTIONS_RESULTS_URL || "");
            core.exportVariable("ACTIONS_RUNTIME_TOKEN", process.env.ACTIONS_RUNTIME_TOKEN || "");
      - name: Build wheels
        uses: PyO3/maturin-action@v1
        env:
          SCCACHE_GHA_CACHE_TO: ${{ matrix.python-version == '3.12' && format('sccache-windows-{0}-3.12', matrix.target) || '' }}
          SCCACHE_GHA_CACHE_FROM: sccache-windows-${{ matrix.target }}-
        with:
          sccache: "true"
          target: ${{ matrix.target == 'arm64' && 'aarch64' || matrix.target }}
          args: -i python --release --out dist
      - name: Test wheel
        shell: bash
        run: |
          uv pip install --force-reinstall dist/robyn*.whl
          cd ~ && python -c "import robyn"

  manylinux:
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13", "3.14"]
        target: [x86_64, aarch64]
        include:
          - target: x86_64
            runner: ubuntu-24.04
          - target: aarch64
            runner: ubuntu-24.04-arm
    steps:
      - uses: actions/checkout@v4
      - name: Configure sccache
        uses: actions/github-script@v7
        with:
          script: |
            core.exportVariable("ACTIONS_RESULTS_URL", process.env.ACTIONS_RESULTS_URL || "");
            core.exportVariable("ACTIONS_RUNTIME_TOKEN", process.env.ACTIONS_RUNTIME_TOKEN || "");
      - name: Build Wheels
        uses: PyO3/maturin-action@v1
        env:
          SCCACHE_GHA_CACHE_TO: ${{ matrix.python-version == '3.12' && format('sccache-manylinux-{0}-3.12', matrix.target) || '' }}
          SCCACHE_GHA_CACHE_FROM: sccache-manylinux-${{ matrix.target }}-
        with:
          sccache: "true"
          target: ${{ matrix.target }}
          args: --zig -i python${{ matrix.python-version }} --release --out dist
          container: quay.io/pypa/manylinux_2_28_${{ matrix.target }}:latest
          docker-options: >-
            -e SCCACHE_GHA_CACHE_TO -e SCCACHE_GHA_CACHE_FROM
            -e ACTIONS_RESULTS_URL -e ACTIONS_RUNTIME_TOKEN
            -e SCCACHE_GHA_RW_MODE
          manylinux: manylinux_2_28
      - name: Test wheel
        run: |
          docker run --rm -v ${{ github.workspace }}/dist:/artifacts python:${{ matrix.python-version }}-slim sh -c "\
            pip install --force-reinstall /artifacts/robyn*.whl && python -c 'import robyn'"

  musllinux:
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13", "3.14"]
        target: [x86_64, aarch64]
        include:
          - target: x86_64
            runner: ubuntu-24.04
          - target: aarch64
            runner: ubuntu-24.04-arm
    steps:
      - uses: actions/checkout@v4
      - name: Configure sccache
        uses: actions/github-script@v7
        with:
          script: |
            core.exportVariable("ACTIONS_RESULTS_URL", process.env.ACTIONS_RESULTS_URL || "");
            core.exportVariable("ACTIONS_RUNTIME_TOKEN", process.env.ACTIONS_RUNTIME_TOKEN || "");
      - name: Build Wheels
        uses: PyO3/maturin-action@v1
        env:
          SCCACHE_GHA_CACHE_TO: ${{ matrix.python-version == '3.12' && format('sccache-musllinux-{0}-3.12', matrix.target) || '' }}
          SCCACHE_GHA_CACHE_FROM: sccache-musllinux-${{ matrix.target }}-
        with:
          sccache: "true"
          target: ${{ matrix.target }}
          args: --zig -i python${{ matrix.python-version }} --release --out dist
          container: quay.io/pypa/musllinux_1_2_${{ matrix.target }}:latest
          docker-options: >-
            -e SCCACHE_GHA_CACHE_TO -e SCCACHE_GHA_CACHE_FROM
            -e ACTIONS_RESULTS_URL -e ACTIONS_RUNTIME_TOKEN
            -e SCCACHE_GHA_RW_MODE
          manylinux: musllinux_1_2
      - name: Test wheel
        run: |
          docker run --rm -v ${{ github.workspace }}/dist:/artifacts python:${{ matrix.python-version }}-alpine sh -c "\
            pip install --force-reinstall /artifacts/robyn*.whl && python -c 'import robyn'"