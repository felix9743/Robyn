# CI to release the project for Linux, Windows, and MacOS
# The purpose of this action is to verify if the release builds are working or not.

name: Preview Release

on:
  push:
    branches:
      - main
      - ci/test-macos
  pull_request:
    branches:
      - main

env:
  UV_SYSTEM_PYTHON: 1

permissions:
  contents: read

jobs:
  macos:
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13", "3.14"]
        target: [x86_64, aarch64]
        include:
          - target: x86_64
            runner: macos-15-intel
            suffix: x86_64
          - target: aarch64
            runner: macos-15
            suffix: arm64
    steps:
      - uses: actions/checkout@v4
      - name: Install uv
        uses: astral-sh/setup-uv@v3
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
      - uses: dtolnay/rust-toolchain@stable
      - name: Build wheels
        uses: PyO3/maturin-action@v1
        with:
          target: ${{ matrix.target }}
          args: -i python --release --out dist
      - name: Install build wheel
        run: |
          uv pip install --force-reinstall dist/robyn*${{ matrix.suffix }}.whl
          cd ~ && python -c 'import robyn'
