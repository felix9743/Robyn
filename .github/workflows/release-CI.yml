# CI to release the project for Linux, Windows, and MacOS
name: Release CI
on:
  push:
    tags:
      - v*
  workflow_dispatch:

env:
  UV_SYSTEM_PYTHON: 1

permissions:
  contents: read

jobs:
  macos:
    runs-on: macos-15
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13", "3.14"]
    steps:
      - uses: actions/checkout@v4
      - name: Install uv
        uses: astral-sh/setup-uv@v3
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-apple-darwin aarch64-apple-darwin
      - name: Rust Cache
        uses: Swatinem/rust-cache@v2
        with:
          key: macos-${{ matrix.python-version }}
      - name: Build wheels - x86_64
        uses: PyO3/maturin-action@v1
        with:
          target: x86_64
          args: -i python --release --out dist
      - name: Build wheels - aarch64
        uses: PyO3/maturin-action@v1
        with:
          target: aarch64
          args: -i python --release --out dist
      - name: Install build wheel
        run: |
          uv pip install --force-reinstall dist/robyn*arm64.whl
          cd ~ && python -c 'import robyn'
      - name: Upload wheels
        uses: actions/upload-artifact@v4
        with:
          name: wheels-${{ github.job }}-${{ matrix.python-version }}
          path: dist

  windows:
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13", "3.14"]
        target: [x64, arm64]
        exclude:
          - target: arm64
            python-version: "3.10"
        include:
          - target: x64
            runner: windows-2025
            architecture: x64
          - target: arm64
            runner: windows-11-arm
            architecture: arm64
    steps:
      - uses: actions/checkout@v4
      - name: Install uv
        uses: astral-sh/setup-uv@v3
      - name: Install Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
          architecture: ${{ matrix.architecture }}
      - uses: dtolnay/rust-toolchain@stable
      - name: Rust Cache
        uses: Swatinem/rust-cache@v2
        with:
          key: windows-${{ matrix.target }}-${{ matrix.python-version }}
      - name: Build wheels
        uses: PyO3/maturin-action@v1
        with:
          target: ${{ matrix.target == 'arm64' && 'aarch64' || matrix.target }}
          args: -i python --release --out dist
      - name: Install build wheel
        shell: bash
        run: |
          uv pip install --force-reinstall dist/robyn*.whl
          cd ~ && python -c 'import robyn'
      - name: Upload wheels
        uses: actions/upload-artifact@v4
        with:
          name: wheels-${{ github.job }}-${{ matrix.target }}-${{ matrix.python-version }}
          path: dist

  manylinux:
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13", "3.14"]
        target: [x86_64, aarch64]
        include:
          - target: x86_64
            runner: ubuntu-24.04
            platform: linux/amd64
          - target: aarch64
            runner: ubuntu-24.04-arm
            platform: linux/arm64
    steps:
      - uses: actions/checkout@v4
      - name: Install uv
        uses: astral-sh/setup-uv@v3
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
      - name: Rust Cache
        uses: Swatinem/rust-cache@v2
        with:
          key: manylinux-${{ matrix.target }}-${{ matrix.python-version }}
      - name: Build Wheels (manylinux)
        uses: PyO3/maturin-action@v1
        with:
          target: ${{ matrix.target }}
          manylinux: manylinux_2_28
          args: --zig -i python${{ matrix.python-version }} --release --out dist
      - name: Test wheel (Slim)
        run: |
          docker run --rm --platform ${{ matrix.platform }} -v ${{ github.workspace }}/dist:/artifacts python:${{ matrix.python-version }}-slim sh -c "\
            apt-get update && apt-get install -y build-essential && \
            pip install --force-reinstall /artifacts/robyn*.whl && \
            cd ~ && python -c 'import robyn'"
      - name: Upload wheels
        uses: actions/upload-artifact@v4
        with:
          name: wheels-${{ github.job }}-${{ matrix.target }}-${{ matrix.python-version }}
          path: dist

  musllinux:
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13", "3.14"]
        target: [x86_64, aarch64]
        include:
          - target: x86_64
            runner: ubuntu-24.04
            platform: linux/amd64
          - target: aarch64
            runner: ubuntu-24.04-arm
            platform: linux/arm64
    steps:
      - uses: actions/checkout@v4
      - name: Install uv
        uses: astral-sh/setup-uv@v3
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
      - name: Rust Cache
        uses: Swatinem/rust-cache@v2
        with:
          key: musllinux-${{ matrix.target }}-${{ matrix.python-version }}
      - name: Build Wheels (musl)
        uses: PyO3/maturin-action@v1
        with:
          target: ${{ matrix.target }}
          manylinux: musllinux_1_2
          args: --zig -i python${{ matrix.python-version }} --release --out dist
      - name: Test wheel (Alpine)
        run: |
          docker run --rm --platform ${{ matrix.platform }} -v ${{ github.workspace }}/dist:/artifacts python:${{ matrix.python-version }}-alpine sh -c "\
            apk add --no-cache build-base autoconf automake libtool && \
            pip install --force-reinstall /artifacts/robyn*.whl && \
            cd ~ && python -c 'import robyn'"
      - name: Upload wheels
        uses: actions/upload-artifact@v4
        with:
          name: wheels-${{ github.job }}-${{ matrix.target }}-${{ matrix.python-version }}
          path: dist

  merge:
    name: Building Single Artifact
    runs-on: ubuntu-24.04
    needs: [macos, windows, manylinux, musllinux]
    if: always() && needs.macos.result == 'success' && needs.windows.result == 'success' && needs.manylinux.result == 'success' && needs.musllinux.result == 'success'
    steps:
      - name: Downloading all Artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          pattern: wheels-*
          merge-multiple: true
      - run: |
          echo "Listing directories"
          ls -R
      - name: Uploading Artifact's Bundle
        uses: actions/upload-artifact@v4
        with:
          name: wheels
          path: artifacts

  release:
    name: Release
    runs-on: ubuntu-24.04
    needs: [macos, windows, manylinux, musllinux, merge]
    if: always() && needs.merge.result == 'success'
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: wheels
      - name: Install uv
        uses: astral-sh/setup-uv@v3
      - uses: actions/setup-python@v6
        with:
          python-version: 3.x
      - name: Publish to PyPi
        env:
          TWINE_USERNAME: __token__
          TWINE_PASSWORD: ${{ secrets.PYPI_PASSWORD }}
        run: |
          uv pip install --upgrade twine
          twine upload --skip-existing *.whl