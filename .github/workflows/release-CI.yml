# CI to release the project for Linux, Windows, and MacOS
name: Release CI
on:
  push:
    tags:
      - v*
  workflow_dispatch:
    inputs:
      enable_linux_cross:
        description: 'Enable Linux cross-compilation (ARM64/ARMv7)'
        required: false
        default: true
        type: boolean
  
env:
  UV_SYSTEM_PYTHON: 1
jobs:
  macos:
    runs-on: macos-15-xlarge
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13", "3.14"]
    steps:
      - uses: actions/checkout@v3
      - name: Install uv
        uses: astral-sh/setup-uv@v3
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-apple-darwin aarch64-apple-darwin
      - name: Build wheels - x86_64
        uses: PyO3/maturin-action@v1
        with:
          target: x86_64
          args: -i python --release --out dist
      - name: Build wheels - aarch64
        uses: PyO3/maturin-action@v1
        with:
          target: aarch64
          args: -i python --release --out dist
      - name: Install build wheel
        run: |
          uv pip install --force-reinstall dist/robyn*aarch64*.whl
          cd ~ && python -c 'import robyn'
      - name: Upload wheels
        uses: actions/upload-artifact@v4
        with:
          name: wheels-${{ github.job }}-${{ matrix.python-version }}
          path: dist

  windows:
    runs-on: windows-2025
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13", "3.14"]
        target: [x64, x86, arm64]
    steps:
      - uses: actions/checkout@v3
      - name: Install uv
        uses: astral-sh/setup-uv@v3
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
          architecture: ${{ matrix.target }}
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target == 'arm64' && 'aarch64-pc-windows-msvc' || (matrix.target == 'x86' && 'i686-pc-windows-msvc' || '') }}
      - name: Build wheels
        uses: PyO3/maturin-action@v1
        with:
          target: ${{ matrix.target }}
          args: -i python --release --out dist
      - name: Install build wheel
        if: matrix.target != 'arm64'
        shell: bash
        run: |
          uv pip install --force-reinstall dist/robyn*.whl
          cd ~ && python -c 'import robyn'
      - name: Upload wheels
        uses: actions/upload-artifact@v4
        with:
          name: wheels-${{ github.job }}-${{ matrix.target }}-${{ matrix.python-version }}
          path: dist

  linux-manylinux:
    runs-on: ubuntu-24.04
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13", "3.14"]
        target: [x86_64, i686, aarch64, armv7]
        include:
          - target: x86_64
            manylinux: manylinux_2_28
          - target: i686
            manylinux: manylinux_2_28
          - target: aarch64
            manylinux: manylinux_2_28
          - target: armv7
            manylinux: manylinux_2_31
    steps:
      - uses: actions/checkout@v3
      - name: Set up QEMU
        if: matrix.target == 'aarch64' || matrix.target == 'armv7'
        uses: docker/setup-qemu-action@v3
      - name: Install uv
        uses: astral-sh/setup-uv@v3
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
      - name: Build Wheels (manylinux)
        uses: PyO3/maturin-action@v1
        with:
          target: ${{ matrix.target }}
          manylinux: ${{ matrix.manylinux }}
          args: -i python${{ matrix.python-version }} --release --out dist
      - name: Test wheel (Slim)
        run: |
          if [ "${{ matrix.target }}" = "x86_64" ]; then
            PLATFORM="linux/amd64"
          elif [ "${{ matrix.target }}" = "i686" ]; then
            PLATFORM="linux/386"
          elif [ "${{ matrix.target }}" = "aarch64" ]; then
            PLATFORM="linux/arm64"
          elif [ "${{ matrix.target }}" = "armv7" ]; then
            PLATFORM="linux/arm/v7"
          fi
          
          docker run --rm --platform $PLATFORM -v ${{ github.workspace }}/dist:/artifacts python:${{ matrix.python-version }}-slim sh -c "\
            pip install --force-reinstall /artifacts/robyn*.whl && \
            cd ~ && python -c 'import robyn'"
      - name: Upload wheels
        uses: actions/upload-artifact@v4
        with:
          name: wheels-${{ github.job }}-${{ matrix.target }}-${{ matrix.python-version }}
          path: dist

  linux-musl:
    runs-on: ubuntu-24.04
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13", "3.14"]
        target: [x86_64, i686, aarch64, armv7]
    steps:
      - uses: actions/checkout@v3
      - name: Set up QEMU
        if: matrix.target == 'aarch64' || matrix.target == 'armv7'
        uses: docker/setup-qemu-action@v3
      - name: Install uv
        uses: astral-sh/setup-uv@v3
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
      - name: Build Wheels (musl)
        uses: PyO3/maturin-action@v1
        with:
          target: ${{ matrix.target }}
          manylinux: musllinux_1_2
          args: -i python${{ matrix.python-version }} --release --out dist
      - name: Test wheel (Alpine)
        run: |
          if [ "${{ matrix.target }}" = "x86_64" ]; then
            PLATFORM="linux/amd64"
          elif [ "${{ matrix.target }}" = "i686" ]; then
            PLATFORM="linux/386"
          elif [ "${{ matrix.target }}" = "aarch64" ]; then
            PLATFORM="linux/arm64"
          elif [ "${{ matrix.target }}" = "armv7" ]; then
            PLATFORM="linux/arm/v7"
          fi
          
          docker run --rm --platform $PLATFORM -v ${{ github.workspace }}/dist:/artifacts python:${{ matrix.python-version }}-alpine sh -c "\
            pip install --force-reinstall /artifacts/robyn*.whl && \
            cd ~ && python -c 'import robyn'"
      - name: Upload wheels
        uses: actions/upload-artifact@v4
        with:
          name: wheels-${{ github.job }}-${{ matrix.target }}-${{ matrix.python-version }}
          path: dist

  merge:
    name: Building Single Artifact
    runs-on: ubuntu-24.04
    needs: [macos, windows, linux-manylinux, linux-musl]
    if: always() && needs.macos.result == 'success' && needs.windows.result == 'success' && needs.linux-manylinux.result == 'success' && needs.linux-musl.result == 'success'
    steps:
      - name: Downloading all Artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          pattern: wheels-*
          merge-multiple: true
      - run: |
          echo "Listing directories"
          ls -R
      - name: Uploading Artifact's Bundle
        uses: actions/upload-artifact@v4
        with:
          name: wheels
          path: artifacts

  release:
    name: Release
    runs-on: ubuntu-24.04
    needs: [macos, windows, linux-manylinux, linux-musl, merge]
    if: always() && needs.merge.result == 'success'
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: wheels
      - name: Install uv
        uses: astral-sh/setup-uv@v3
      - uses: actions/setup-python@v6
        with:
          python-version: 3.x
      - name: Publish to PyPi
        env:
          TWINE_USERNAME: __token__
          TWINE_PASSWORD: ${{ secrets.PYPI_PASSWORD }}
        run: |
          uv pip install --upgrade twine
          twine upload --skip-existing *.whl