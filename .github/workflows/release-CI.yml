# CI to release the project for Linux, Windows, and macOS.

name: Release CI

on:
  push:
    tags:
      - v*
  workflow_dispatch:

permissions:
  contents: read

env:
  PYTHON_VERSIONS: "3.10 3.11 3.12 3.13 3.14"

jobs:
  macos-wheels:
    runs-on: ${{ matrix.runner }}
    name: ${{ 'macos' }}-all
    strategy:
      matrix:
        include:
          - runner: macos-15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup uv
        uses: astral-sh/setup-uv@v5

      - name: Setup Python
        run: |
          uv python install ${{ env.PYTHON_VERSIONS }} \
            $(echo "${{ env.PYTHON_VERSIONS }}" | sed 's/\S*/&-macos-x86_64/g')
          uv python update-shell

      - name: Cache Rust target
        uses: actions/cache@v4
        with:
          path: target
          key: cache-rust-macos-${{ hashFiles('Cargo.toml') }}
          restore-keys: cache-rust-macos-

      - name: Generate Maturin arguments
        id: flags
        shell: bash
        run: |
          FLAGS=""
          for v in ${{ env.PYTHON_VERSIONS }}; do FLAGS="$FLAGS -i $v"; done
          echo "py=$FLAGS" >> $GITHUB_OUTPUT

      - name: Build Wheels (x86_64)
        uses: PyO3/maturin-action@v1
        with:
          target: x86_64
          args: ${{ steps.flags.outputs.py }} --release --strip --out dist

      - name: Build Wheels (aarch64)
        uses: PyO3/maturin-action@v1
        with:
          target: aarch64
          args: ${{ steps.flags.outputs.py }} --release --strip --out dist

      - name: Test Wheels
        shell: bash
        run: |
          for p in x86_64 aarch64; do
            if [ "$p" == "x86_64" ]; then arch="x86_64"; else arch="arm64"; fi
            for v in ${{ env.PYTHON_VERSIONS }}; do
              uv pip install --system --break-system-packages -p ${v}-macos-${p} --force-reinstall dist/robyn*cp$(echo $v | tr -d '.')*${arch}.whl
              (cd ~ && uv run -p ${v}-macos-${p} python -c "import robyn")
            done
          done

      - name: Upload wheels
        uses: actions/upload-artifact@v4
        with:
          name: ${{ runner.os }}-all-wheels
          path: dist/*.whl

  other-wheels:
    runs-on: ${{ matrix.runner }}
    name: ${{ matrix.libc || 'windows' }}-${{ matrix.target }}
    strategy:
      fail-fast: false
      matrix:
        include:
          # Windows wheels
          - runner: windows-2022
            target: x86_64
          - runner: windows-11-arm
            target: aarch64

          # Manylinux wheels
          - runner: ubuntu-24.04
            target: x86_64
            libc: manylinux
            container: quay.io/pypa/manylinux_2_28_x86_64:latest
          - runner: ubuntu-24.04-arm
            target: aarch64
            libc: manylinux
            container: quay.io/pypa/manylinux_2_28_aarch64:latest

          # Musllinux wheels
          - runner: ubuntu-24.04
            target: x86_64
            libc: musllinux
            container: quay.io/pypa/musllinux_1_2_x86_64:latest
          - runner: ubuntu-24.04-arm
            target: aarch64
            libc: musllinux
            container: quay.io/pypa/musllinux_1_2_aarch64:latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup uv
        uses: astral-sh/setup-uv@v5

      - name: Setup Python
        shell: bash
        run: |
          uv python install $(echo "${{ env.PYTHON_VERSIONS }}" | \
            sed "s/\S*/&-${{ contains(matrix.runner, 'windows') && 'windows' || 'linux' }}-${{ matrix.target }}/g")
          uv python update-shell

      - name: Cache Rust target
        uses: actions/cache@v4
        with:
          path: target
          restore-keys: cache-rust-${{ matrix.libc || matrix.runner }}-
          key: cache-rust-${{ matrix.libc || matrix.runner }}-${{ hashFiles('Cargo.toml') }}

      - name: Generate Maturin arguments
        id: flags
        shell: bash
        run: |
          FLAGS=""
          for v in ${{ env.PYTHON_VERSIONS }}; do FLAGS="$FLAGS -i $v"; done
          echo "py=$FLAGS" >> $GITHUB_OUTPUT

      - name: Build Wheels
        uses: PyO3/maturin-action@v1
        with:
          target: ${{ matrix.target }}
          container: ${{ matrix.container }}
          manylinux: ${{ matrix.libc == 'manylinux' && 'manylinux_2_28' || 'musllinux_1_2' }}
          args: ${{ steps.flags.outputs.py }} --release --strip --out dist

      - name: Test wheels
        shell: bash
        run: |
          for v in ${{ env.PYTHON_VERSIONS }}; do
            uv pip install --system --break-system-packages -p $v --force-reinstall dist/robyn*cp$(echo $v | tr -d '.')*.whl
            (cd ~ && uv run -p $v python -c "import robyn")
          done

      - name: Upload wheels
        uses: actions/upload-artifact@v4
        with:
          name: ${{ runner.os }}-${{ matrix.libc || matrix.target }}-wheels
          path: dist/*.whl

  release:
    name: Releasing to PyPi
    runs-on: ubuntu-24.04
    needs: [macos-wheels, other-wheels]
    steps:
      - name: Download and merge all wheels
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Verify downloaded wheels
        run: ls -l dist/

      - name: Setup uv
        uses: astral-sh/setup-uv@v8.3.2

      - name: Publish to PyPi
        env:
          TWINE_USERNAME: __token__
          TWINE_PASSWORD: ${{ secrets.PYPI_PASSWORD }}
        run: uvx twine upload --skip-existing dist/*.whl
